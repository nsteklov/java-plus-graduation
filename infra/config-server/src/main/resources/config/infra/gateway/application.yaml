spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: main_service_route
          uri: lb://main-service
          predicates:
            - Path=/categories/**, /compilations/**, /events/**, /users/**, /admin/**, /comments/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                methods: GET
                exceptions:
                  - java.net.ConnectException
                  - org.springframework.web.client.ResourceAccessException

server:
  port: 8080

logging:
  level:
    root: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    gateway:
      enabled: true
      access: read-only


